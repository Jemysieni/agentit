<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Palautteenantoagentti</title>

  <script src="https://cdn.botframework.com/botframework-webchat/latest/webchat.js"></script>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
    }

    .page {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 12px 16px;
      background: #003e74;
      color: white;
      font-size: 18px;
      font-weight: 600;
    }

    .subheader {
      padding: 8px 16px;
      background: #eef3f8;
      color: #333;
      font-size: 14px;
      border-bottom: 1px solid #d9e2ec;
    }

    #webchat {
      flex: 1;
      min-height: 700px;
    }

    .error {
      margin: 16px;
      padding: 12px;
      background: #fde7e9;
      border: 1px solid #d13438;
      color: #a4262c;
      white-space: pre-wrap;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">Palautteenantoagentti</div>
    <div class="subheader">
      Voit keskustella agentin kanssa ja liittää tiedoston, jos agentti pyytää sitä.
    </div>
    <div id="webchat" role="main"></div>
  </div>

  <script>
    (async function () {
      try {
        if (!window.WebChat) {
          throw new Error("WebChat-kirjasto ei latautunut. Tarkista script src -rivi.");
        }

        // VAIHDA TÄMÄ
        const tokenEndpoint = "PASTA_TAHAN_TOKEN_ENDPOINT_URL";

        if (!tokenEndpoint || tokenEndpoint.includes("PASTA_TAHAN")) {
          throw new Error("tokenEndpoint puuttuu tai sitä ei ole vaihdettu oikeaksi.");
        }

        const url = new URL(tokenEndpoint);
        const apiVersion = url.searchParams.get("api-version");

        if (!apiVersion) {
          throw new Error("Token endpointistä ei löytynyt api-version-parametria.");
        }

        const regionalUrl = new URL(
          `/powervirtualagents/regionalchannelsettings?api-version=${apiVersion}`,
          tokenEndpoint
        );

        const [regionalSettingsResponse, tokenResponseRaw] = await Promise.all([
          fetch(regionalUrl),
          fetch(tokenEndpoint)
        ]);

        if (!regionalSettingsResponse.ok) {
          throw new Error(`regionalchannelsettings epäonnistui: ${regionalSettingsResponse.status} ${regionalSettingsResponse.statusText}`);
        }

        if (!tokenResponseRaw.ok) {
          throw new Error(`tokenEndpoint fetch epäonnistui: ${tokenResponseRaw.status} ${tokenResponseRaw.statusText}`);
        }

        const regionalSettings = await regionalSettingsResponse.json();
        const tokenResponse = await tokenResponseRaw.json();

        if (!regionalSettings?.channelUrlsById?.directline) {
          throw new Error("regionalchannelsettings-vastauksesta ei löytynyt directline-osoitetta.");
        }

        if (!tokenResponse?.token) {
          throw new Error("Token-vastauksesta ei löytynyt token-kenttää.");
        }

        const directLineDomain = new URL(
          "v3/directline",
          regionalSettings.channelUrlsById.directline
        ).toString();

        const directLine = window.WebChat.createDirectLine({
          token: tokenResponse.token,
          domain: directLineDomain,
          webSocket: true
        });

        const styleSet = window.WebChat.createStyleSet({
          rootHeight: '100%',
          rootWidth: '100%',
          backgroundColor: '#ffffff',
          bubbleBackground: '#f2f4f8',
          bubbleFromUserBackground: '#dceeff',
          bubbleBorderRadius: 12,
          sendBoxBorderTop: '1px solid #d0d7de'
        });

        window.WebChat.renderWebChat(
          {
            directLine,
            styleSet,
            locale: 'fi-FI',
            userID: 'moodle-user',
            username: 'Opiskelija'
          },
          document.getElementById('webchat')
        );

        directLine.postActivity({
          type: 'event',
          name: 'startConversation',
          from: { id: 'moodle-user', role: 'user' },
          locale: 'fi-FI'
        }).subscribe(
          id => console.log("startConversation lähetetty", id),
          err => console.error("startConversation epäonnistui", err)
        );

      } catch (err) {
        console.error("Web chatin käynnistysvirhe:", err);
        document.getElementById('webchat').innerHTML =
          '<div class="error">Web chatin käynnistäminen epäonnistui.\n\n' +
          (err?.message || err) +
